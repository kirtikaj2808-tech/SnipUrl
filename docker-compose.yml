services:
  postgres:
    image: postgres:16-alpine
    container_name: snipurl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: snipurl
      POSTGRES_PASSWORD: snipurl123
      POSTGRES_DB: snipurldb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: snipurl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: